<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>남양주 로드뷰 챌린지 - 카카오맵 끝판왕 에디션</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        #pano { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #status-bar {
            position: absolute; top: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.75);
            color: white; padding: 15px 0; text-align: center; font-size: 20px; font-weight: bold;
            z-index: 10; display: flex; justify-content: center; gap: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .highlight { color: #FFD700; }

        #map-ui {
            position: absolute; bottom: 25px; right: 25px; z-index: 10;
            width: 360px; background: rgba(255, 255, 255, 0.95); padding: 18px;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s ease; backdrop-filter: blur(5px);
        }
        #map-ui:hover { transform: scale(1.02); }
        #map { width: 100%; height: 260px; background-color: #eee; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ddd; }
        
        .btn-group { display: flex; gap: 10px; }
        button {
            padding: 15px; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background-color 0.2s, transform 0.1s; flex: 1;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #cccccc !important; cursor: not-allowed; color: #666; }
        
        #guess-btn { background-color: #4285F4; }
        #guess-btn:hover { background-color: #3367D6; }
        #skip-btn { background-color: #FF9800; flex: 0.5; }
        #skip-btn:hover { background-color: #F57C00; }

        #loading-overlay {
            display: flex; position: absolute; top: 0; left: 0; z-index: 30;
            width: 100%; height: 100%; background: #222;
            color: white; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4CAF50; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #result-overlay, #final-overlay {
            display: none; position: absolute; top: 0; left: 0; z-index: 20;
            width: 100%; height: 100%; background: rgba(0,0,0,0.88);
            color: white; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .result-card, .final-card {
            background: #2c2c2c; padding: 40px; border-radius: 20px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); text-align: center;
            max-width: 600px; width: 100%; border: 1px solid #444;
        }
        h1 { margin-top: 0; color: #4CAF50; font-size: 36px; margin-bottom: 10px; }
        .score-box { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; display: inline-block; margin-top: 10px; }
        #address-text { font-size: 16px; color: #aaa; margin-top: 15px; font-style: italic; }
        #result-map { width: 100%; height: 300px; background-color: #eee; border-radius: 10px; margin-top: 25px; border: 1px solid #444; }
        
        .action-btn { margin-top: 30px; background-color: #4CAF50; width: auto; padding: 15px 50px; font-size: 18px; }
        .action-btn:hover { background-color: #45a049; }
        
        .final-card h1 { color: #FFD700; font-size: 42px; }
        .final-score { font-size: 60px; font-weight: bold; color: #fff; margin: 20px 0; }
        .rank-text { font-size: 24px; color: #4CAF50; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status-bar" style="display: none;">
        <div>라운드: <span id="round-text" class="highlight">1 / 10</span></div>
        <div>총점: <span id="total-score-text" class="highlight">0점</span></div>
    </div>

    <div id="loading-overlay">
        <h2>남양주 로드뷰를 불러오는 중입니다...🚗</h2>
        <div class="spinner" id="spinner"></div>
        <p style="margin-top: 15px; color: #aaa;">선별된 50개의 좌표 데이터를 카카오맵으로 탐색합니다.</p>
    </div>

    <div id="pano"></div>

    <div id="map-ui" style="display: none;">
        <div style="margin-bottom: 12px; font-weight: bold; text-align: center; color: #333; font-size: 15px;">지도를 클릭해 현재 위치를 예상해 보세요!</div>
        <div id="map"></div>
        <div class="btn-group">
            <button id="skip-btn" title="점수 차감 없이 다른 장소로 넘어갑니다">건너뛰기</button>
            <button id="guess-btn" disabled>정답 제출</button>
        </div>
    </div>

    <div id="result-overlay">
        <div class="result-card">
            <h1 id="round-title">탐색 완료!</h1>
            <p id="distance-text">오차 거리: 계산 중...</p>
            <div class="score-box">
                <span style="color: #FFD700; font-weight: bold; font-size: 24px;">획득 점수: </span>
                <span id="score-text" style="color: #FFD700; font-weight: bold; font-size: 24px;">계산 중...</span>
            </div>
            <p id="address-text"></p>
            <div id="result-map"></div>
            <button id="next-round-btn" class="action-btn" onclick="nextRound()">다음 라운드 이동</button>
        </div>
    </div>

    <div id="final-overlay">
        <div class="final-card">
            <h1>도전 종료!</h1>
            <p>당신의 10라운드 총합 점수는...</p>
            <div class="final-score" id="final-score">0점</div>
            <p class="rank-text" id="rank-title">남양주 길찾기 마스터</p>
            <button class="action-btn" onclick="location.reload()" style="margin-top: 40px;">새 게임 시작하기</button>
        </div>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=cd11ba5a6c4101803585670117288466&libraries=services"></script>

    <script>
        // 지정 좌표 50개 
        const RAW_COORDS_DATA = `
37.6009416	127.178075
37.6363143	127.216264
37.6247068	127.148767
37.6431045	127.237618
37.7182440	127.184180
37.6510288	127.115054
37.6278363	127.201919
37.6561381	127.303654
37.6572000	127.302938
37.6602520	127.175667
37.6243236	127.150363
37.6007500	127.174613
37.7107138	127.117080
37.5937646	127.172728
37.7183873	127.200996
37.5352995	127.262940
37.6083498	127.169974
37.7108215	127.120966
37.6515103	127.239868
37.6463655	127.125396
37.6208810	127.147914
37.6570061	127.303135
37.5857700	127.169210
37.7125651	127.187209
37.6544378	127.129112
37.6243490	127.150425
37.6274933	127.202805
37.6454905	127.230648
37.6460958	127.125966
37.7110065	127.120556
37.6017495	127.174615
37.6073645	127.157253
37.6563336	127.183802
37.6241933	127.149881
37.6542221	127.243012
37.7115948	127.187497
37.6494533	127.140703
37.6245490	127.149969
37.6572473	127.302496
37.6431156	127.237588
37.6593155	127.286319
37.6276598	127.202404
37.6580540	127.124296
37.6593030	127.175126
37.6572388	127.302459
37.7199190	127.181541
37.6930646	127.211051
37.6088620	127.167927
37.6741945	127.114376
37.7184758	127.205043
        `;

        let TARGET_COORDS = [];
        let map, rv, rvClient, geocoder, resultMap;
        let actualLocation = null;
        let actualAddress = "";
        let guessMarker = null;
        let searchAttempts = 0;

        let currentRound = 1;
        const MAX_ROUNDS = 10;
        let totalScore = 0;

        window.onload = function() {
            // 좌표 데이터 파싱
            const lines = RAW_COORDS_DATA.trim().split('\n');
            for (let i = 0; i < lines.length; i++) {
                const parts = lines[i].trim().split(/\s+/);
                if (parts.length >= 2) {
                    TARGET_COORDS.push({ lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) });
                }
            }

            // 카카오맵 및 로드뷰 객체 초기화
            rv = new kakao.maps.Roadview(document.getElementById('pano'));
            rvClient = new kakao.maps.RoadviewClient();
            geocoder = new kakao.maps.services.Geocoder();

            const mapContainer = document.getElementById('map');
            map = new kakao.maps.Map(mapContainer, {
                center: new kakao.maps.LatLng(37.606, 127.161),
                level: 8
            });

            // 지도 클릭 이벤트 (남양주 경계 필터링 내장)
            kakao.maps.event.addListener(map, 'click', function(mouseEvent) {
                const latlng = mouseEvent.latLng;
                const lat = latlng.getLat();
                const lng = latlng.getLng();

                // 남양주시 대략적 Bounding Box (위도/경도 이탈 시 경고)
                if (lat < 37.514 || lat > 37.760 || lng < 127.110 || lng > 127.380) {
                    alert("남양주시 내부를 클릭해주세요!");
                    return;
                }

                if (guessMarker) {
                    guessMarker.setPosition(latlng);
                } else {
                    guessMarker = new kakao.maps.Marker({ position: latlng });
                    guessMarker.setMap(map);
                    document.getElementById("guess-btn").disabled = false;
                }
            });

            // 버튼 이벤트 연결
            document.getElementById("guess-btn").addEventListener("click", calculateScore);
            document.getElementById("skip-btn").addEventListener("click", () => {
                document.getElementById("map-ui").style.display = "none";
                document.getElementById("loading-overlay").style.display = "flex";
                if(guessMarker) { guessMarker.setMap(null); guessMarker = null; }
                document.getElementById("guess-btn").disabled = true;
                searchAttempts = 0;
                findValidStreetView();
            });

            startRound();
        };

        function startRound() {
            document.getElementById("round-text").innerText = `${currentRound} / ${MAX_ROUNDS}`;
            document.getElementById("total-score-text").innerText = `${totalScore}점`;
            document.getElementById("status-bar").style.display = "flex";
            
            searchAttempts = 0;
            if(guessMarker) { guessMarker.setMap(null); guessMarker = null; }
            document.getElementById("guess-btn").disabled = true;
            
            document.getElementById("loading-overlay").style.display = "flex";
            document.getElementById("map-ui").style.display = "none";
            
            findValidStreetView();
        }

        function findValidStreetView() {
            searchAttempts++;
            if (searchAttempts > 20) searchAttempts = 0;

            const randomData = TARGET_COORDS[Math.floor(Math.random() * TARGET_COORDS.length)];
            const position = new kakao.maps.LatLng(randomData.lat, randomData.lng);
            
            // 반경 50m 이내의 카카오 로드뷰 탐색
            rvClient.getNearestPanoId(position, 50, function(panoId) {
                if (panoId === null) {
                    setTimeout(findValidStreetView, 50);
                    return;
                }

                // 주소 변환 (카카오 API는 lng, lat 순서로 요청)
                geocoder.coord2Address(position.getLng(), position.getLat(), function(result, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        actualAddress = result[0].address.address_name;
                        actualLocation = position;
                        
                        rv.setPanoId(panoId, position);
                        
                        document.getElementById("loading-overlay").style.display = "none";
                        document.getElementById("map-ui").style.display = "block";
                        
                        // 맵 리레이아웃
                        map.relayout();
                        map.setCenter(new kakao.maps.LatLng(37.636, 127.216));
                    } else {
                        setTimeout(findValidStreetView, 50);
                    }
                });
            });
        }

        // 자체 거리 계산 알고리즘 (하버사인 공식 - 오차 없는 정밀 계산)
        function computeDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // 지구 반경 (미터)
            const p1 = lat1 * Math.PI / 180;
            const p2 = lat2 * Math.PI / 180;
            const dp = (lat2 - lat1) * Math.PI / 180;
            const dl = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dp / 2) * Math.sin(dp / 2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) * Math.sin(dl / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function calculateScore() {
            if (!guessMarker || !actualLocation) return;
            const guessLoc = guessMarker.getPosition();
            
            const distanceInMeters = computeDistance(actualLocation.getLat(), actualLocation.getLng(), guessLoc.getLat(), guessLoc.getLng());
            const distanceInKm = (distanceInMeters / 1000).toFixed(2);

            let roundScore = 5000 * Math.exp(-distanceInKm / 3.0); 
            roundScore = Math.max(0, Math.round(roundScore)); 
            totalScore += roundScore;

            const distanceText = distanceInMeters < 1000 ? Math.round(distanceInMeters) + "m" : distanceInKm + "km";
            document.getElementById("distance-text").innerText = `실제 위치와의 오차: ${distanceText}`;
            document.getElementById("score-text").innerText = `${roundScore}점 / 5000점`;
            document.getElementById("address-text").innerText = `정답 주소: ${actualAddress}`;
            
            document.getElementById("total-score-text").innerText = `${totalScore}점`;
            
            const nextBtn = document.getElementById("next-round-btn");
            if (currentRound < MAX_ROUNDS) {
                nextBtn.innerText = "다음 라운드 이동";
                nextBtn.onclick = () => { document.getElementById("result-overlay").style.display = "none"; nextRound(); };
            } else {
                nextBtn.innerText = "최종 결과 보기";
                nextBtn.onclick = () => { document.getElementById("result-overlay").style.display = "none"; showFinalScore(); };
            }

            // 결과창 UI를 먼저 표시
            document.getElementById("result-overlay").style.display = "flex";
            document.getElementById("map-ui").style.display = "none";

            setTimeout(() => {
                showResultMap(guessLoc, actualLocation);
            }, 100);
        }

        function nextRound() {
            currentRound++;
            startRound();
        }

        function showFinalScore() {
            document.getElementById("final-score").innerText = `${totalScore}점`;
            
            let rank = "";
            if (totalScore >= 45000) rank = "🏆 인간 내비게이션! 남양주 토박이시군요.";
            else if (totalScore >= 35000) rank = "🚗 길눈이 매우 밝은 드라이버입니다.";
            else if (totalScore >= 20000) rank = "🤔 아는 길만 아는 평범한 시민입니다.";
            else rank = "😅 남양주에서 길 잃어버리기 딱 좋습니다.";
            
            document.getElementById("rank-title").innerText = rank;
            document.getElementById("final-overlay").style.display = "flex";
            document.getElementById("status-bar").style.display = "none";
        }
        
        function showResultMap(guess, actual) {
            const mapDiv = document.getElementById("result-map");
            mapDiv.innerHTML = ''; 

            resultMap = new kakao.maps.Map(mapDiv, {
                center: actual,
                level: 5
            });

            // 내 마커와 실제 마커 생성
            const guessM = new kakao.maps.Marker({ position: guess });
            const actualM = new kakao.maps.Marker({ position: actual });
            guessM.setMap(resultMap);
            actualM.setMap(resultMap);

            // 두 점을 연결하는 폴리라인
            const polyline = new kakao.maps.Polyline({
                path: [guess, actual],
                strokeWeight: 4,
                strokeColor: '#FF0000',
                strokeOpacity: 0.8,
                strokeStyle: 'solid'
            });
            polyline.setMap(resultMap);

            // 두 점이 모두 화면에 들어오도록 카메라 줌/이동
            const bounds = new kakao.maps.LatLngBounds();
            bounds.extend(guess);
            bounds.extend(actual);
            resultMap.setBounds(bounds);
        }
    </script>
</body>
</html>
